- name: Setup prompt
  ansible.builtin.shell: set-prompt {{ tool_name }}

- name: Check github runner already exist or not
  ansible.builtin.stat:
    path: /actions-runner/.runner
  register: runner_stat

- name: Github action setup
  when: not runner_stat.stat.exists
  block:
    - name: Create github-runner user
      ansible.builtin.user:
        name: github

    - name: make github action folder
      ansible.builtin.file:
        path: /actions-runner
        owner: github
        group: github
        state: directory

    - name: Download github runner
      ansible.builtin.unarchive:
        src: https://github.com/actions/runner/releases/download/v2.332.0/actions-runner-linux-x64-2.332.0.tar.gz
        dest: /actions-runner
        owner: github
        group: github
        remote_src: yes

    - name: Read token from vault
      set_fact:
        github_token: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=github-runner/data/path:token token=' ~ vault_token ~ ' url=http://vault.devopsmanju.shop:8200') }} --unattended"

    - name: Create runner and start the configuration
      ansible.builtin.shell: >
        ./config.sh
        --url https://github.com/manjudevopszone/tool-setup-code-2025
        --token {{ github_token }}
      args:
        chdir: /actions-runner
      become_user: github
      when: not runner_stat.stat.exists

    - name: Copy service file
      ansible.builtin.template:
        src: github-runner.service
        dest: /etc/systemd/system/github-runner.service

- name: Start github-runner service
  ansible.builtin.systemd:
    name: github-runner
    state: started
    enabled: yes
    daemon-reload: yes

- name: Copy terraform repo file
  ansible.builtin.template:
    src: hashicorp.repo
    dest: /etc/yum.repos.d/hashicorp.repo

- name: Install terraform
  ansible.builtin.dnf:
    name: terraform
    state: installed

- name: Copy Kubectl repo file
  ansible.builtin.template:
    src: kubernetes.repo
    dest: /etc/yum.repos.d/kubernetes.repo

- name: Install Kubectl
  ansible.builtin.dnf:
    name: kubectl
    state: installed

- name: Install helm
  ansible.builtin.shell: |
    curl -O -L https://get.helm.sh/helm-v4.1.3-linux-amd64.tar.gz
    tar -xf helm-v4.1.3-linux-amd64.tar.gz
    mv linux-amd64/helm /bin/helm
  args:
    chdir: /tmp

- name: Get docker repo
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/rhel/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo

- name: Install docker
  ansible.builtin.dnf:
    name: docker-ce
    state: installed

- name: start docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes
    daemon-reload: yes

- name: add github user to docker group
  ansible.builtin.user:
    name: github
    group: docker


