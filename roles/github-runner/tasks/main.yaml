- name: Setup prompt
  ansible.builtin.shell: set-prompt {{ tool_name }}

- name: Create github-runner user
  ansible.builtin.user:
    name: github

- name: make github action folder
  ansible.builtin.file:
    path: /actions-runner
    owner: github
    group: github
    state: directory

- name: Download github runner
  ansible.builtin.unarchive:
    src: https://github.com/actions/runner/releases/download/v2.332.0/actions-runner-linux-x64-2.332.0.tar.gz
    dest: /actions-runner
    owner: github
    group: github
    remote_src: yes

- name: Create the runner and start configure github
  ansible.builtin.shell: ./config.sh --url https://github.com/manjudevopszone --token A6ZG75Y2HIKZDRUYGA2NJVTJWLQCG